name: 🚀 Deploy BorsaItalianaAlertBot su VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: ⚙️ Deploy su VPS
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Clona il repository
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH al VPS con KEY_PEM (con riavvio Container solo se necessario)
        run: |
          echo "🔐 Scrivo la chiave privata..."
          echo "${{ secrets.VPS_PEM_BASE64 }}" | base64 -d > vps_key.pem
          chmod 600 vps_key.pem

          echo "📦 Connessione SSH al VPS..."
          ssh -i ./vps_key.pem -o StrictHostKeyChecking=no "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'bash -s' << 'EOF'
            PROJECT_DIR="/home/ubuntu/BorsaItalianaAlert"

            echo "📁 [1/4] Verifico/creo la cartella del progetto..."
            if [ ! -d "$PROJECT_DIR" ]; then
              git clone https://github.com/miketester10/BorsaItalianaAlert.git "$PROJECT_DIR"
            fi
            cd "$PROJECT_DIR"

            echo "📥 [2/4] Eseguo git pull..."
            OUTPUT=$(git pull origin main)

            echo "🔍 Verifico se ci sono modifiche..."
            if [[ "$OUTPUT" == *"Already up to date."* ]]; then
              echo "ℹ️ Nessuna modifica trovata, il container non verrà riavviato."
            else
              echo "✅ Modifiche trovate:"
              echo "$OUTPUT"

              echo "🛑 [3/4] Stop del container esistente..."
              docker compose stop || true

              echo "▶️ [4/4] Avvio del container aggiornato..."
              docker compose up -d

              echo "🎉 Deploy completato con successo!"
            fi
          EOF
